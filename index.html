<!DOCTYPE html>
<html lang="de">
<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"/>

    <title>Activity Tracker</title>

    <link
        rel="stylesheet"
        href="src/style.css"/>

</head>

<body>

<div class="app">

    <!-- TOP -->

    <div class="topbar">

        <div class="toggle">

            <div class="toggle-pill"></div>

            <button
                class="active"
                data-view="month">

                Monat

            </button>

            <button
                data-view="year">

                Jahr

            </button>

        </div>

    </div>

    <!-- VIEWS -->

    <div class="views">

        <!-- MONTH -->

        <div
            class="view active"
            id="month-view">

            <div class="month-content">

                <div class="month-header">

                    <div class="month-title">
                        Mai 2026
                    </div>

                    <div class="month-sub">
                        74 Aktivitäten
                    </div>

                </div>

                <div class="month-grid-wrap">

                    <div class="weekdays">

                        <span>Mo</span>
                        <span>Di</span>
                        <span>Mi</span>
                        <span>Do</span>
                        <span>Fr</span>
                        <span>Sa</span>
                        <span>So</span>

                    </div>

                    <div
                        class="month-grid"
                        id="month-grid">

                    </div>

                </div>

            </div>

        </div>

        <!-- YEAR -->

        <div
            class="view"
            id="year-view">

            <div class="year-content">

                <div class="month-labels">

                    <span>Jan</span>
                    <span>Feb</span>
                    <span>Mär</span>
                    <span>Apr</span>
                    <span>Mai</span>
                    <span>Jun</span>
                    <span>Jul</span>
                    <span>Aug</span>
                    <span>Sep</span>
                    <span>Okt</span>
                    <span>Nov</span>
                    <span>Dez</span>

                </div>

                <div class="year-wrap">

                    <div class="year-days">

                        <span>Mo</span>
                        <span></span>
                        <span>Mi</span>
                        <span></span>
                        <span>Fr</span>
                        <span></span>
                        <span>So</span>

                    </div>

                    <div
                        class="year-grid"
                        id="year-grid">

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="src/script.js"></script>

</body>
</html>
